name: 'Full CI/CD: Event-Driven Billing'

on:
  push:
    branches: [ "main" ]

jobs:
  changes:
    name: '1. Detectar Alterações'
    runs-on: ubuntu-latest
    outputs:
      infra_updated: ${{ steps.filter.outputs.terraform == 'true' || github.run_number == 1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            terraform: ['terraform/**']
            app: ['api-gateway/**', 'billing-worker/**', 'k8s/**']

  terraform:
    name: '2. Infraestrutura (Terraform)'
    needs: [changes]
    if: needs.changes.outputs.infra_updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

  setup-env:
    name: '3. Auto-Discovery & Cloud Vars'
    needs: [terraform]
    # Executa se o terraform passou ou se foi pulado (infra já existe)
    if: always() && !contains(needs.terraform.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
          
      - name: 'Wait for AWS Propagation'
        run: sleep 40

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get Terraform Outputs
        id: tf_outputs
        working-directory: ./terraform
        run: |
          terraform init
          # Captura os valores reais do State do Terraform (S3)
          echo "ECR_API_URL=$(terraform output -raw ecr_api_url)" >> $GITHUB_ENV
          echo "ECR_WORKER_URL=$(terraform output -raw ecr_worker_url)" >> $GITHUB_ENV
          echo "SQS_URL=$(terraform output -raw sqs_url)" >> $GITHUB_ENV
          echo "DB_HOST=$(terraform output -raw db_endpoint)" >> $GITHUB_ENV
          echo "REDIS_HOST=$(terraform output -raw redis_endpoint)" >> $GITHUB_ENV

      - name: Generate aws.env
        run: |
          {
            echo "DOCKER_IMAGE_API=${{ env.ECR_API_URL }}:latest"
            echo "DOCKER_IMAGE_WORKER=${{ env.ECR_WORKER_URL }}:latest"
            echo "AWS_SQS_QUEUE_URL=${{ env.SQS_URL }}"
            echo "DB_HOST=${{ env.DB_HOST }}"
            echo "DB_DATABASE=billingdb"
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}"
            echo "AWS_REGION=us-east-2"
            echo "REDIS_ENDPOINT=${{ env.REDIS_HOST }}"
            echo "EKS_CLUSTER_NAME=billing-engine-cluster"
          } > aws.env

      - name: Upload das Variáveis
        uses: actions/upload-artifact@v4
        with:
          name: aws-vars
          path: aws.env
          retention-days: 1

  ci-qa-build:
    name: '4. CI: QA & Build'
    needs: [setup-env]
    if: always() && needs.setup-env.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Vars
        uses: actions/download-artifact@v4
        with: { name: aws-vars }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json

      - name: 🧪 Unit Tests (API Gateway)
        working-directory: ./api-gateway
        run: |
          npm ci
          npm test -- --passWithNoTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: 📦 Build and Push to ECR
        run: |
          source aws.env
          aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin $(echo $DOCKER_IMAGE_API | cut -d'/' -f1)
          
          docker build -t $DOCKER_IMAGE_API ./api-gateway
          docker push $DOCKER_IMAGE_API
          
          docker build -t $DOCKER_IMAGE_WORKER ./billing-worker
          docker push $DOCKER_IMAGE_WORKER

  cd-deploy:
    name: '5. CD: Deploy EKS'
    needs: [ci-qa-build]
    if: always() && needs.ci-qa-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Vars
        uses: actions/download-artifact@v4
        with: { name: aws-vars }

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name billing-engine-cluster --region us-east-2
          kubectl get nodes

      - name: 🚀 Sync & Apply Manifests
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          # 1. Carrega as variáveis de infra
          source aws.env
          export $(cat aws.env | xargs)
          
          # 2. Re-autentica o kubectl (Garante o token ativo para este shell)
          aws eks update-kubeconfig --name billing-engine-cluster --region us-east-2
          
          # 3. Injeção dinâmica e Apply
          envsubst < k8s/configmap.yaml | kubectl apply -f -
          envsubst < k8s/secrets.yaml | kubectl apply -f -
          
          # Deploy dos Workloads
          envsubst < k8s/api/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/api/svc.yaml
          kubectl apply -f k8s/api/hpa.yaml
          
          envsubst < k8s/worker/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/worker/hpa.yaml
          
          # 4. Rollout
          kubectl rollout restart deployment billing-api
          kubectl rollout restart deployment billing-worker
          kubectl rollout status deployment billing-api --timeout=150s